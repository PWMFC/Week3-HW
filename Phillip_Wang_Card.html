<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Phillip Wang - Gamification & EduTech Expert</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel (讓瀏覽器能即時編譯 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 防止手機瀏覽器預設滑動刷新等干擾 */
    body { margin: 0; padding: 0; overflow: hidden; background-color: #001a33; }
    
    /* 自訂動畫 Keyframes */
    @keyframes float-up {
      0% { transform: translateY(0) scale(1); opacity: 0.8; }
      100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
    }
    .animate-float-up { animation: float-up 2s ease-out forwards; }

    @keyframes float-up-fade {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-50px); opacity: 0; }
    }
    .animate-float-up-fade { animation: float-up-fade 1s ease-out forwards; }

    @keyframes water-flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .bg-water {
      background: linear-gradient(-45deg, #001a33, #002b5e, #001a33, #003366);
      background-size: 400% 400%;
      animation: water-flow 15s ease infinite;
    }
    
    @keyframes pulse-fast {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .animate-pulse { animation: pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- 圖示 SVG 元件 (取代外部依賴) ---
    const IconInstagram = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>);
    const IconFacebook = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>);
    const IconGithub = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>);
    const IconMail = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>);
    const IconGlobe = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>);
    const IconInfo = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>);
    const IconPlay = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
    const IconRotateCcw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>);
    const IconX = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);

    // --- 語系設定 (i18n) ---
    const translations = {
      tw: {
        name: '王子軒 Phillip Wang', title: '遊戲化與教育科技專家', rules: '遊戲規則', start: '開始遊戲', playAgain: '再玩一次',
        score: '分數', time: '剩餘時間', gameOver: '遊戲結束！', finalScore: '最終分數',
        ruleGood: '好魚 (+10分 或 +3秒)', ruleBad: '壞魚 (-5分 或 -5秒)', ruleNeutral: '中性魚 (無效果)', close: '關閉'
      },
      en: {
        name: 'Phillip Wang', title: 'Gamification & EduTech Expert', rules: 'Rules', start: 'Start Game', playAgain: 'Play Again',
        score: 'Score', time: 'Time', gameOver: 'Game Over!', finalScore: 'Final Score',
        ruleGood: 'Good (+10 pts or +3s)', ruleBad: 'Bad (-5 pts or -5s)', ruleNeutral: 'Neutral (No effect)', close: 'Close'
      },
      jp: {
        name: '王子軒 Phillip Wang', title: 'ゲーミフィケーション＆EduTech専門家', rules: 'ルール', start: 'スタート', playAgain: 'もう一度',
        score: 'スコア', time: '残り時間', gameOver: 'ゲーム終了！', finalScore: '最終スコア',
        ruleGood: '良い魚 (+10点 or +3秒)', ruleBad: '悪い魚 (-5点 or -5秒)', ruleNeutral: '普通の魚 (効果なし)', close: '閉じる'
      }
    };

    // --- 遊戲設定 ---
    const GAME_DURATION = 30;
    const FISH_TYPES = [
      { type: 'good', emojis: ['🐠', '🐡', '🐬'], score: 10, time: 0, color: 'text-green-400', label: '+10' },
      { type: 'good_time', emojis: ['🧜‍♀️', '🐢'], score: 0, time: 3, color: 'text-blue-400', label: '+3s' },
      { type: 'bad', emojis: ['🦈', '🐙'], score: -5, time: 0, color: 'text-red-500', label: '-5' },
      { type: 'bad_time', emojis: ['🦑', '🐊'], score: 0, time: -5, color: 'text-orange-500', label: '-5s' },
      { type: 'neutral', emojis: ['🐟', '🦐', '🦀'], score: 0, time: 0, color: 'text-gray-400', label: 'Miss!' }
    ];

    function App() {
      const [lang, setLang] = useState('tw');
      const t = translations[lang];

      // 遊戲狀態
      const [gameState, setGameState] = useState('idle');
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(GAME_DURATION);
      const [showRules, setShowRules] = useState(false);

      // 畫面特效狀態
      const [bubbles, setBubbles] = useState([]);
      const [ripples, setRipples] = useState([]);
      const [floatingTexts, setFloatingTexts] = useState([]);
      
      const fishesRef = useRef([]);
      const [renderFishes, setRenderFishes] = useState([]);
      const requestRef = useRef();
      const lastTimeRef = useRef(0);

      const genId = () => Math.random().toString(36).substr(2, 9);

      // --- 特效處理 ---
      const createBubble = (x, y) => {
        const id = genId();
        const size = Math.random() * 20 + 10;
        setBubbles(prev => [...prev, { id, x, y, size }]);
        setTimeout(() => setBubbles(prev => prev.filter(b => b.id !== id)), 2000);
      };

      const createRipple = (x, y) => {
        const id = genId();
        setRipples(prev => [...prev, { id, x, y }]);
        setTimeout(() => setRipples(prev => prev.filter(r => r.id !== id)), 1000);
      };

      const createFloatingText = (x, y, text, color) => {
        const id = genId();
        setFloatingTexts(prev => [...prev, { id, x, y, text, color }]);
        setTimeout(() => setFloatingTexts(prev => prev.filter(ft => ft.id !== id)), 1000);
      };

      // --- 遊戲邏輯 ---
      const startGame = () => {
        setGameState('playing');
        setScore(0);
        setTimeLeft(GAME_DURATION);
        fishesRef.current = [];
        setRenderFishes([]);
      };

      const handleFishCatch = (e, fish) => {
        e.stopPropagation();
        createBubble(e.clientX, e.clientY);
        createFloatingText(e.clientX, e.clientY, fish.config.label, fish.config.color);

        if (gameState === 'playing') {
          createRipple(e.clientX, e.clientY);
          setScore(prev => prev + fish.config.score);
          setTimeLeft(prev => {
            const newTime = prev + fish.config.time;
            return newTime > 0 ? newTime : 0;
          });
        }
        fishesRef.current = fishesRef.current.filter(f => f.id !== fish.id);
      };

      const handleBackgroundClick = (e) => {
        createBubble(e.clientX, e.clientY);
        if (gameState === 'playing') {
          createRipple(e.clientX, e.clientY);
        }
      };

      const handleCardClick = (e) => {
        e.stopPropagation();
        createBubble(e.clientX, e.clientY);
      };

      // --- 動畫迴圈 ---
      const updateFishes = useCallback((time) => {
        if (!lastTimeRef.current) lastTimeRef.current = time;
        const deltaTime = time - lastTimeRef.current;
        
        if (gameState === 'playing' && Math.random() < 0.03) {
          const typeConfig = FISH_TYPES[Math.floor(Math.random() * FISH_TYPES.length)];
          const emoji = typeConfig.emojis[Math.floor(Math.random() * typeConfig.emojis.length)];
          const isLeftToRight = Math.random() > 0.5;
          const startY = Math.random() * 80 + 10;
          const speed = (Math.random() * 0.2 + 0.1) * (window.innerWidth / 1000);

          fishesRef.current.push({
            id: genId(), x: isLeftToRight ? -50 : window.innerWidth + 50, y: startY,
            emoji, isLeftToRight, speed: isLeftToRight ? speed : -speed, config: typeConfig
          });
        }

        if (fishesRef.current.length > 0) {
            fishesRef.current = fishesRef.current.filter(fish => {
            fish.x += fish.speed * deltaTime;
            if (fish.isLeftToRight && fish.x > window.innerWidth + 100) return false;
            if (!fish.isLeftToRight && fish.x < -100) return false;
            return true;
          });
          setRenderFishes([...fishesRef.current]);
        }

        lastTimeRef.current = time;
        requestRef.current = requestAnimationFrame(updateFishes);
      }, [gameState]);

      useEffect(() => {
        if (gameState === 'playing') {
          requestRef.current = requestAnimationFrame(updateFishes);
        } else {
          fishesRef.current = [];
          setRenderFishes([]);
          cancelAnimationFrame(requestRef.current);
        }
        return () => cancelAnimationFrame(requestRef.current);
      }, [gameState, updateFishes]);

      useEffect(() => {
        let timer;
        if (gameState === 'playing' && timeLeft > 0) {
          timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
        } else if (gameState === 'playing' && timeLeft <= 0) {
          setGameState('finished');
        }
        return () => clearInterval(timer);
      }, [gameState, timeLeft]);


      return (
        <div 
          className="relative w-full h-screen overflow-hidden bg-water text-white touch-none select-none font-sans"
          onPointerDown={handleBackgroundClick}
        >
          {/* 頂部控制列 */}
          <div className="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-40 pointer-events-none">
            <div className="flex space-x-2 pointer-events-auto bg-black/20 p-1.5 rounded-full backdrop-blur-sm">
              <IconGlobe className="w-5 h-5 ml-2 mt-0.5 text-white/70" />
              {['tw', 'en', 'jp'].map(l => (
                <button
                  key={l}
                  onClick={(e) => { e.stopPropagation(); setLang(l); }}
                  className={`px-3 py-1 rounded-full text-sm font-medium transition-colors ${
                    lang === l ? 'bg-blue-500 text-white' : 'text-white/60 hover:text-white'
                  }`}
                >
                  {l.toUpperCase()}
                </button>
              ))}
            </div>

            <div className="flex flex-col items-end space-y-2 pointer-events-auto">
              {gameState !== 'idle' && (
                <div className="bg-white/10 backdrop-blur-md border border-white/20 p-3 rounded-2xl flex space-x-4 shadow-lg">
                  <div className="flex flex-col items-center">
                    <span className="text-xs text-white/70">{t.score}</span>
                    <span className="text-2xl font-bold text-green-400">{score}</span>
                  </div>
                  <div className="w-px bg-white/20"></div>
                  <div className="flex flex-col items-center">
                    <span className="text-xs text-white/70">{t.time}</span>
                    <span className={`text-2xl font-bold ${timeLeft <= 5 ? 'text-red-500 animate-pulse' : 'text-blue-300'}`}>
                      {timeLeft}s
                    </span>
                  </div>
                </div>
              )}
              
              <div className="flex space-x-2">
                <button 
                  onClick={(e) => { e.stopPropagation(); setShowRules(true); }}
                  className="p-2 bg-white/10 hover:bg-white/20 rounded-full backdrop-blur transition-colors flex items-center justify-center"
                  title={t.rules}
                >
                  <IconInfo className="w-5 h-5" />
                </button>
                
                {gameState === 'idle' && (
                  <button 
                    onClick={(e) => { e.stopPropagation(); startGame(); }}
                    className="flex items-center space-x-1 px-4 py-2 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-full shadow-lg hover:shadow-blue-500/50 hover:scale-105 transition-all"
                  >
                    <IconPlay className="w-4 h-4" />
                    <span className="font-bold">{t.start}</span>
                  </button>
                )}
                
                {gameState === 'finished' && (
                  <button 
                    onClick={(e) => { e.stopPropagation(); startGame(); }}
                    className="flex items-center space-x-1 px-4 py-2 bg-gradient-to-r from-green-500 to-emerald-600 rounded-full shadow-lg hover:shadow-green-500/50 hover:scale-105 transition-all"
                  >
                    <IconRotateCcw className="w-4 h-4" />
                    <span className="font-bold">{t.playAgain}</span>
                  </button>
                )}
              </div>
            </div>
          </div>

          {/* 遊戲層：魚類 */}
          {renderFishes.map(fish => (
            <div
              key={fish.id}
              onPointerDown={(e) => handleFishCatch(e, fish)}
              className="absolute z-20 cursor-pointer hover:scale-125 transition-transform"
              style={{
                left: `${fish.x}px`,
                top: `${fish.y}%`,
                transform: `translate(-50%, -50%) ${!fish.isLeftToRight ? 'scaleX(-1)' : ''}`,
                fontSize: '3rem',
                padding: '10px'
              }}
            >
              {fish.emoji}
            </div>
          ))}

          {/* 特效層 */}
          {bubbles.map(b => (
            <div key={b.id} className="absolute rounded-full border border-white/40 bg-white/10 animate-float-up pointer-events-none z-30" style={{ left: b.x - b.size / 2, top: b.y - b.size / 2, width: b.size, height: b.size }} />
          ))}
          {ripples.map(r => (
            <div key={r.id} className="absolute rounded-full border-2 border-cyan-300/60 animate-ping pointer-events-none z-10" style={{ left: r.x - 25, top: r.y - 25, width: 50, height: 50 }} />
          ))}
          {floatingTexts.map(ft => (
            <div key={ft.id} className={`absolute font-black text-2xl animate-float-up-fade pointer-events-none z-50 drop-shadow-md ${ft.color}`} style={{ left: ft.x, top: ft.y - 20, transform: 'translate(-50%, -50%)' }}>{ft.text}</div>
          ))}

          {/* 核心層：中央數位名片 */}
          <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-30">
            <div 
              onPointerDown={handleCardClick}
              className="pointer-events-auto flex flex-col items-center bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-3xl shadow-2xl max-w-sm w-11/12 transform transition-all hover:border-white/40 group"
            >
              <div className="relative mb-6">
                <div className="absolute inset-0 bg-gradient-to-br from-blue-400 to-emerald-400 rounded-2xl blur-lg opacity-50 group-hover:opacity-100 transition-opacity duration-500"></div>
                <img 
                  src="https://lh3.googleusercontent.com/d/13zihoNG6m9PRtnKc7gTkaP_ePMua9WE2" 
                  alt="Phillip Wang" 
                  className="relative w-28 h-28 md:w-36 md:h-36 rounded-2xl object-cover border-4 border-white/30 shadow-xl transform transition-transform duration-500 group-hover:-rotate-3 group-hover:scale-105"
                />
              </div>

              <h1 className="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-blue-200 tracking-tight mb-2 text-center">
                {t.name}
              </h1>
              <h2 className="text-sm md:text-base font-medium text-blue-200 mb-4 text-center">
                {t.title}
              </h2>
              
              <div className="flex flex-wrap justify-center gap-2 mb-8">
                <span className="px-3 py-1 bg-gradient-to-r from-yellow-600 to-yellow-400 text-black text-xs font-black rounded-full tracking-widest shadow-[0_0_10px_rgba(250,204,21,0.5)]">GAMIFICATION</span>
                <span className="px-3 py-1 bg-gradient-to-r from-yellow-600 to-yellow-400 text-black text-xs font-black rounded-full tracking-widest shadow-[0_0_10px_rgba(250,204,21,0.5)]">EDUTECH</span>
              </div>

              <div className="grid grid-cols-2 md:flex md:flex-row gap-4 w-full justify-center">
                <a href="https://instagram.com/your_ig_account" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center p-3 bg-white/5 hover:bg-white/20 rounded-xl transition-all hover:scale-110 hover:shadow-lg hover:-translate-y-1">
                  <IconInstagram className="w-6 h-6 text-pink-400" />
                </a>
                <a href="https://facebook.com/your_fb_account" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center p-3 bg-white/5 hover:bg-white/20 rounded-xl transition-all hover:scale-110 hover:shadow-lg hover:-translate-y-1">
                  <IconFacebook className="w-6 h-6 text-blue-400" />
                </a>
                <a href="https://github.com/your_github_account" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center p-3 bg-white/5 hover:bg-white/20 rounded-xl transition-all hover:scale-110 hover:shadow-lg hover:-translate-y-1">
                  <IconGithub className="w-6 h-6 text-gray-200" />
                </a>
                <a href="mailto:pwmfc91319@gmail.com?subject=Hello%20Phillip!%20探討教育科技與遊戲化合作" className="flex items-center justify-center p-3 bg-white/5 hover:bg-white/20 rounded-xl transition-all hover:scale-110 hover:shadow-lg hover:-translate-y-1">
                  <IconMail className="w-6 h-6 text-emerald-400" />
                </a>
              </div>
            </div>
          </div>

          {/* 彈出視窗：遊戲規則 */}
          {showRules && (
            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 pointer-events-auto" onPointerDown={() => setShowRules(false)}>
              <div className="bg-[#002b5e] border border-blue-400/30 p-8 rounded-3xl max-w-sm w-11/12 shadow-2xl relative" onPointerDown={e => e.stopPropagation()}>
                <button onClick={() => setShowRules(false)} className="absolute top-4 right-4 text-white/50 hover:text-white flex items-center justify-center">
                  <IconX className="w-6 h-6" />
                </button>
                <h3 className="text-2xl font-bold mb-6 text-center">{t.rules}</h3>
                <div className="space-y-4">
                  <div className="flex items-center space-x-4 bg-white/5 p-3 rounded-xl"><div className="text-3xl">🐠🐬</div><div className="font-bold text-green-400">{t.ruleGood}</div></div>
                  <div className="flex items-center space-x-4 bg-white/5 p-3 rounded-xl"><div className="text-3xl">🦈🐙</div><div className="font-bold text-red-500">{t.ruleBad}</div></div>
                  <div className="flex items-center space-x-4 bg-white/5 p-3 rounded-xl"><div className="text-3xl">🐟🦐</div><div className="font-bold text-gray-400">{t.ruleNeutral}</div></div>
                </div>
                <button onClick={() => setShowRules(false)} className="w-full mt-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-colors">{t.close}</button>
              </div>
            </div>
          )}

          {/* 彈出視窗：遊戲結束 */}
          {gameState === 'finished' && (
            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 pointer-events-auto">
              <div className="bg-gradient-to-b from-[#003366] to-[#001a33] border border-blue-400/50 p-10 rounded-3xl max-w-sm w-11/12 shadow-2xl flex flex-col items-center">
                <h3 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-2">{t.gameOver}</h3>
                <p className="text-white/70 mb-6">{t.finalScore}</p>
                <div className="text-7xl font-black text-white mb-8 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">{score}</div>
                <button onClick={(e) => { e.stopPropagation(); startGame(); }} className="flex items-center space-x-2 w-full justify-center py-4 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500 rounded-xl font-bold text-xl transition-all shadow-lg hover:shadow-blue-500/50 hover:-translate-y-1">
                  <IconRotateCcw className="w-6 h-6" />
                  <span>{t.playAgain}</span>
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
